- name:
  hosts: local
  connection: local
  tasks:
  -  name: printing ansible facts
     ansible.builtin.debug:
       msg: "{{ ansible_facts }}"

  - name: check redhat or not 
    ansible.builtin.debug:
      msg: "yes, packages manager is redhat"
    when: ansible_facts.os_family == "RedHat"

  - name: check debian or not 
    ansible.builtin.debug:
      msg: "yes, packages manager is Debian"
    when: ansible_facts.os_family == "Debain"